services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-tutor-postgres
    environment:
      POSTGRES_USER: professor
      POSTGRES_PASSWORD: professor
      POSTGRES_DB: professor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U professor"]
      interval: 5s
      timeout: 5s
      retries: 5

  latex-renderer:
    build:
      context: ./backend/latex_renderer
    container_name: ai-tutor-latex-renderer
    environment:
      LATEX_RENDER_PORT: "3001"
    ports:
      - "3001:3001"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: ai-tutor-backend
    env_file:
      - .env
    environment:
      FRONTEND_URL: "http://localhost:3000"
      LATEX_RENDER_URL: "http://latex-renderer:3001/mathjax"
      DATABASE_URL: "postgresql+asyncpg://professor:professor@postgres:5432/professor"
    depends_on:
      postgres:
        condition: service_healthy
      latex-renderer:
        condition: service_started
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: ai-tutor-frontend
    environment:
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:8000"
      NEXT_PUBLIC_BACKEND_WS_URL: "ws://localhost:8000"
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
